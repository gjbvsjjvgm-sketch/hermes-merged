# Hermes Agent Configuration
# =========================

# Model configuration
model:
  # Default model provider (openrouter, anthropic, openai, google, etc.)
  # provider: openrouter
  # default: anthropic/claude-sonnet-4.6

# Display settings
display:
  show_reasoning: true

# Agent settings
agent:
  reasoning_effort: medium

# Platform toolsets
platform_toolsets:
  cli:
    - browser
    - clarify
    - code_execution
    - cronjob
    - delegation
    - file
    - image_gen
    - memory
    - session_search
    - skills
    - terminal
    - todo
    - web
    - webhook

# Terminal configuration
terminal:
  backend: local
  timeout: 60

# Context compression
compression:
  enabled: true
  threshold: 0.85
